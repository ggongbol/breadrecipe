<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍞 달콤한 제빵일기</title>
  <style>
    :root {
      --bg-color: #FFF9F2;
      --main-color: #FFDEB4;
      --point-color: #FFB4B4;
      --text-color: #61481C;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; }
    header { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-shadow: 1px 1px var(--main-color); }
    
    .card { background: white; border-radius: 20px; padding: 20px; width: 100%; max-width: 450px; box-shadow: 0 8px 16px rgba(255, 180, 180, 0.2); margin-bottom: 20px; border: 2px solid var(--main-color); }
    h3 { margin-bottom: 15px; border-bottom: 2px dashed var(--main-color); padding-bottom: 5px; }
    
    label { font-size: 14px; font-weight: bold; display: block; margin-top: 10px; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--main-color); border-radius: 10px; background-color: #FFFDF9; font-size: 14px; outline: none; }
    input:focus, textarea:focus { border-color: var(--point-color); }
    
    /* 동적 재료 세트 스타일 */
    .ingredient-group { display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }
    .ingredient-row { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; }
    .ingredient-row input { margin-top: 0; }
    .ingredient-row input.ing-name { flex: 2; }
    .ingredient-row input.ing-amount { flex: 1; }
    
    /* 버튼 공통 및 커스텀 */
    .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
    button:active { transform: scale(0.98); }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    
    .btn-add-ing { background-color: #FFF; border: 1px dashed var(--text-color); color: var(--text-color); padding: 6px 12px; font-size: 12px; margin-top: 5px; width: 100%; }
    .btn-remove-ing { background-color: #E0E0E0; color: #666; padding: 10px; border-radius: 10px; font-size: 12px; }
    .btn-save { flex: 1; background-color: var(--main-color); color: var(--text-color); }
    .btn-delete { flex: 1; background-color: var(--point-color); color: white; }
    .btn-cancel { flex: 1; background-color: #E0E0E0; color: #666; }

    input[type="file"] { background: white; padding: 5px; }

    /* 목록 스타일 */
    .diary-list { list-style: none; width: 100%; max-width: 450px; }
    .diary-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--main-color); transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .diary-item:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    .diary-item .title { font-weight: bold; }
    .diary-item .date { font-size: 12px; color: #999; }
    
    .thumb-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 10px; border: 1px solid var(--main-color); }
    .item-left { display: flex; align-items: center; }
    .preview-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid var(--main-color); }
  </style>
</head>
<body>

  <header>🍞 나의 제빵일기</header>

  <div class="card">
    <h3 id="form-title">오늘의 빵 기록하기</h3>
    <form id="bakery-form">
      <input type="hidden" id="row-id">
      
      <label>빵 종류</label>
      <input type="text" id="bread-type" placeholder="예: 소금빵, 식빵" required>
      
      <label>재료 및 양</label>
      <div id="ingredient-container" class="ingredient-group">
        <div class="ingredient-row">
          <input type="text" class="ing-name" placeholder="재료 (예: 강력분)" required>
          <input type="text" class="ing-amount" placeholder="양 (예: 300g)" required>
          <button type="button" class="btn-remove-ing" onclick="removeIngredientRow(this)">X</button>
        </div>
      </div>
      <button type="button" class="btn-add-ing" id="btn-add-ingredient">+ 재료 추가하기</button>
      
      <label>레시피</label>
      <textarea id="recipe" rows="4" placeholder="만드는 순서와 팁을 적어주세요."></textarea>
      
      <label>연관 URL</label>
      <input type="url" id="ref-url" placeholder="https://...">
      
      <label>사진 등록 (카메라/앨범)</label>
      <input type="file" id="photo-file" accept="image/*">
      <img id="image-preview" class="preview-img">

      <div class="btn-group">
        <button type="submit" class="btn-save" id="btn-submit">저장하기</button>
        <button type="button" class="btn-delete" id="btn-delete" style="display:none;">삭제</button>
        <button type="button" class="btn-cancel" id="btn-cancel" style="display:none;">취소</button>
      </div>
    </form>
  </div>

  <header style="font-size: 20px; margin-top: 10px;">📋 지난 기록 목록</header>
  <ul class="diary-list" id="diary-list"></ul>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_FVskH7za1Fb5_fWIm1DELEnI8OhKu5DYo-5DRjcqL61EQXazUq0t873KQprfB4CK/exec"; 
    let diaryData = [];
    let fileBase64 = "";
    let fileName = "";
    let fileMimeType = "";

    // ➕ 새로운 재료 행 추가 기능
    document.getElementById('btn-add-ingredient').onclick = () => {
      createIngredientRow("", "");
    };

    function createIngredientRow(name = "", amount = "") {
      const container = document.getElementById('ingredient-container');
      const row = document.createElement('div');
      row.className = 'ingredient-row';
      row.innerHTML = `
        <input type="text" class="ing-name" placeholder="재료" value="${name}" required>
        <input type="text" class="ing-amount" placeholder="양" value="${amount}" required>
        <button type="button" class="btn-remove-ing" onclick="removeIngredientRow(this)">X</button>
      `;
      container.appendChild(row);
    }

    // ❌ 재료 행 삭제 기능
    function removeIngredientRow(button) {
      const rows = document.querySelectorAll('.ingredient-row');
      if (rows.length <= 1) {
        alert("최소 한 개의 재료는 입력해야 해요!");
        return;
      }
      button.parentElement.remove();
    }

    // 데이터 목록 불러오기
    async function loadLogs() {
      const listEl = document.getElementById('diary-list');
      listEl.innerHTML = "<p style='text-align:center;'>기록을 불러오는 중... 🥐</p>";
      
      try {
        const response = await fetch(GAS_URL);
        diaryData = await response.json();
        
        listEl.innerHTML = "";
        if(diaryData.length === 0) {
          listEl.innerHTML = "<p style='text-align:center; color:#999;'>아직 기록이 없어요.</p>";
          return;
        }

        diaryData.forEach(item => {
          const li = document.createElement('li');
          li.className = 'diary-item';
          li.onclick = () => viewDetail(item);
          
          const imgHtml = item['사진 URL'] 
            ? `<img src="${item['사진 URL']}" class="thumb-img">`
            : `<div class="thumb-img" style="display:flex; justify-content:center; align-items:center; background:#eee; font-size:24px;">🥖</div>`;

          li.innerHTML = `
            <div class="item-left">
              ${imgHtml}
              <div>
                <div class="title">${item['빵종류']}</div>
                <div class="date">${item['입력날짜']}</div>
              </div>
            </div>
            ➔
          `;
          listEl.appendChild(li);
        });
      } catch (error) {
        listEl.innerHTML = "<p style='text-align:center; color:red;'>불러오기 실패 😢</p>";
      }
    }

    // 파일 선택 및 미리보기
    document.getElementById('photo-file').onchange = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      fileName = file.name;
      fileMimeType = file.type;
      const reader = new FileReader();
      reader.onload = function(evt) {
        fileBase64 = evt.target.result;
        const preview = document.getElementById('image-preview');
        preview.src = fileBase64;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    };

    // 폼 초기화
    function resetForm() {
      document.getElementById('bakery-form').reset();
      document.getElementById('row-id').value = '';
      document.getElementById('form-title').innerText = '오늘의 빵 기록하기';
      document.getElementById('btn-submit').innerText = '저장하기';
      document.getElementById('btn-submit').disabled = false;
      document.getElementById('btn-delete').style.display = 'none';
      document.getElementById('btn-cancel').style.display = 'none';
      document.getElementById('image-preview').style.display = 'none';
      fileBase64 = ""; fileName = ""; fileMimeType = "";

      // 재료 입력창 한 개만 남기고 리셋
      const container = document.getElementById('ingredient-container');
      container.innerHTML = `
        <div class="ingredient-row">
          <input type="text" class="ing-name" placeholder="재료 (예: 강력분)" required>
          <input type="text" class="ing-amount" placeholder="양 (예: 300g)" required>
          <button type="button" class="btn-remove-ing" onclick="removeIngredientRow(this)">X</button>
        </div>
      `;
    }

    // 상세 보기 (시트의 콤마 데이터를 쪼개서 개별 입력창으로 채워줌)
    function viewDetail(item) {
      document.getElementById('form-title').innerText = '빵 기록 수정 / 삭제';
      document.getElementById('row-id').value = item.id;
      document.getElementById('bread-type').value = item['빵종류'];
      document.getElementById('recipe').value = item['레시피'];
      document.getElementById('ref-url').value = item['연관 url'] || '';
      
      // 쉼표로 묶인 재료와 양 분리해서 동적 생성
      const names = String(item['재료']).split(', ');
      const amounts = String(item['양']).split(', ');
      const container = document.getElementById('ingredient-container');
      container.innerHTML = ""; // 기존 창 비우기

      names.forEach((name, idx) => {
        createIngredientRow(name, amounts[idx] || "");
      });

      const imgPreview = document.getElementById('image-preview');
      if(item['사진 URL']) {
        imgPreview.src = item['사진 URL'];
        imgPreview.style.display = 'block';
      } else {
        imgPreview.style.display = 'none';
      }

      document.getElementById('btn-submit').innerText = '수정하기';
      document.getElementById('btn-delete').style.display = 'inline-block';
      document.getElementById('btn-cancel').style.display = 'inline-block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 데이터 수집 후 CUD 전송
    document.getElementById('bakery-form').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('row-id').value;
      const action = id ? "update" : "create";
      
      // 배열로 입력된 재료들을 가져와 시트에 맞게 '쉼표'로 병합
      const nameInputs = document.querySelectorAll('.ing-name');
      const amountInputs = document.querySelectorAll('.ing-amount');
      
      let namesArray = [];
      let amountsArray = [];
      
      nameInputs.forEach((input, index) => {
        namesArray.push(input.value.trim());
        amountsArray.push(amountInputs[index].value.trim());
      });

      document.getElementById('btn-submit').innerText = "업로드 중...";
      document.getElementById('btn-submit').disabled = true;

      const payload = {
        action: action,
        id: parseInt(id),
        breadType: document.getElementById('bread-type').value,
        ingredients: namesArray.join(', '), // '강력분, 이스트, 버터' 형태로 결합
        amounts: amountsArray.join(', '),     // '300g, 4g, 40g' 형태로 결합
        recipe: document.getElementById('recipe').value,
        url: document.getElementById('ref-url').value,
        fileData: fileBase64,
        fileName: fileName,
        fileMimeType: fileMimeType
      };

      try {
        await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        resetForm();
        loadLogs();
      } catch (e) {
        alert("처리에 실패했습니다.");
        document.getElementById('btn-submit').innerText = id ? "수정하기" : "저장하기";
        document.getElementById('btn-submit').disabled = false;
      }
    };

    document.getElementById('btn-delete').onclick = async () => {
      if(!confirm("정말 이 기록을 삭제할까요?")) return;
      const id = document.getElementById('row-id').value;
      document.getElementById('btn-submit').disabled = true;
      try {
        await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "delete", id: parseInt(id) })
        });
        resetForm();
        loadLogs();
      } catch(e) {
        alert("삭제 실패");
        document.getElementById('btn-submit').disabled = false;
      }
    };

    document.getElementById('btn-cancel').onclick = resetForm;
    loadLogs();
  </script>
</body>
</html>
